<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>VIO AI — Desain Modern</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0b1120, #030712);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Container utama dengan efek glass */
    .app {
      max-width: 750px;
      width: 100%;
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* Header dengan gradien */
    .header {
      background: linear-gradient(135deg, rgba(0, 245, 160, 0.15), rgba(59, 130, 246, 0.08));
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid rgba(0, 245, 160, 0.25);
      text-align: center;
    }

    .header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(120deg, #c084fc, #3b82f6, #00f5a0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .header p {
      color: #94a3b8;
      font-size: 0.75rem;
      margin-top: 0.25rem;
      letter-spacing: 0.5px;
    }

    /* Versi selector */
    .version-bar {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      background: rgba(0, 0, 0, 0.3);
      flex-wrap: wrap;
    }

    .ver-btn {
      background: #1e293b;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #cbd5e1;
      backdrop-filter: blur(4px);
    }

    .ver-btn.active {
      background: linear-gradient(115deg, #3b82f6, #a855f7);
      color: white;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
    }

    /* Area chat dengan scroll custom */
    .chat-container {
      height: 460px;
      overflow-y: auto;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Custom scroll */
    .chat-container::-webkit-scrollbar {
      width: 4px;
    }
    .chat-container::-webkit-scrollbar-track {
      background: #1e293b;
      border-radius: 8px;
    }
    .chat-container::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 8px;
    }

    /* Pesan bubble */
    .message {
      display: flex;
      width: 100%;
      animation: fadeSlideUp 0.25s ease;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.bot {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 80%;
      padding: 0.7rem 1rem;
      border-radius: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.45;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .user .bubble {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      border-bottom-right-radius: 0.3rem;
    }

    .bot .bubble {
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      border-bottom-left-radius: 0.3rem;
    }

    /* Avatar bot */
    .avatar {
      width: 32px;
      height: 32px;
      background: linear-gradient(145deg, #00f5a0, #3b82f6);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 8px;
      font-size: 14px;
      font-weight: bold;
      color: #0f172a;
      box-shadow: 0 0 10px rgba(0,245,160,0.4);
    }

    /* Input area */
    .input-area {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      padding: 0.8rem 1.2rem;
      border-radius: 3rem;
      color: #f1f5f9;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }

    .input-area input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
    }

    .input-area button {
      background: linear-gradient(95deg, #3b82f6, #a855f7);
      border: none;
      padding: 0.75rem 1.4rem;
      border-radius: 3rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    .input-area button:active {
      transform: scale(0.96);
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 0.4rem 0;
    }
    .typing span {
      width: 6px;
      height: 6px;
      background: #cbd5e1;
      border-radius: 50%;
      animation: pulse 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0);}
      30% { opacity: 1; transform: translateY(-4px);}
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* Responsif */
    @media (max-width: 550px) {
      .bubble { max-width: 90%; }
      .version-bar { gap: 0.4rem; }
      .ver-btn { padding: 0.3rem 0.8rem; font-size: 0.7rem; }
      .header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>⚡ VIO AI</h1>
    <p>Asisten cerdas · 4 mode kepribadian</p>
  </div>

  <div class="version-bar" id="versionBar">
    <button class="ver-btn" data-ver="K1.5">🟢 K1.5 Basic</button>
    <button class="ver-btn" data-ver="K2">🔵 K2 Standar</button>
    <button class="ver-btn" data-ver="K2.5">🟡 K2.5 Advanced</button>
    <button class="ver-btn" data-ver="K3">🔴 K3 Pro</button>
  </div>

  <div class="chat-container" id="chatContainer">
    <!-- pesan akan muncul di sini -->
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Tanya VIO... (contoh: apa itu AI, hitung 15*8, buat kode HTML)" autocomplete="off">
    <button id="sendBtn">Kirim</button>
  </div>
</div>

<script>
  // ==================== AI VIO CERDAS (LOKAL) ====================
  let currentVersion = "K2";          // versi aktif
  let conversationMemory = [];         // untuk konteks (10 pesan)

  // Pengetahuan dasar + deteksi intent
  function getBotResponse(userMsg, version) {
    const lower = userMsg.toLowerCase();
    
    // 1. Hitung matematika
    const mathMatch = lower.match(/(\d+)\s*([\+\-\*\/])\s*(\d+)/);
    if (mathMatch) {
      let a = parseFloat(mathMatch[1]), b = parseFloat(mathMatch[3]);
      let op = mathMatch[2];
      let result;
      if (op === '+') result = a + b;
      else if (op === '-') result = a - b;
      else if (op === '*') result = a * b;
      else if (op === '/') result = b !== 0 ? a / b : "error (bagi nol)";
      return `🧮 Hasil: ${a} ${op} ${b} = ${result}`;
    }
    
    // 2. Sapaan
    if (/(halo|hai|hey|selamat pagi|selamat siang)/i.test(lower)) {
      return `Halo! Saya VIO ${version}. Ada yang bisa dibantu? Coba tanyakan coding, sains, atau ide bisnis.`;
    }
    
    // 3. Pengetahuan umum & teknologi
    const faq = {
      "apa itu javascript": "JavaScript adalah bahasa pemrograman utama untuk web interaktif. Bisa digunakan di browser dan server (Node.js).",
      "apa itu react": "React adalah library JavaScript dari Facebook untuk membuat antarmuka pengguna modern dan efisien.",
      "apa itu nodejs": "Node.js adalah runtime JavaScript yang memungkinkan JS berjalan di server.",
      "apa itu ai": "AI (Kecerdasan Buatan) adalah bidang komputer yang membuat mesin bisa belajar dan mengambil keputusan seperti manusia.",
      "cara buat website": "1. Pelajari HTML, CSS, JS. 2. Buat file index.html. 3. Hosting gratis di Vercel/Netlify.",
      "apa itu html": "HTML adalah kerangka halaman web (HyperText Markup Language).",
      "apa itu css": "CSS untuk styling tampilan (warna, ukuran, tata letak).",
      "apa itu api": "API adalah jembatan antar aplikasi. Contoh: aplikasi cuaca mengambil data dari server cuaca via API.",
      "apa itu database": "Database tempat menyimpan data terstruktur, seperti MySQL, PostgreSQL, MongoDB.",
    };
    for (let [key, answer] of Object.entries(faq)) {
      if (lower.includes(key)) return answer;
    }
    
    // 4. Deteksi "apa itu ..."
    const apaMatch = lower.match(/apa itu (\w+)/);
    if (apaMatch) {
      const term = apaMatch[1];
      return `Maaf, saya belum punya informasi detail tentang "${term}". Coba tanyakan topik lain (javascript, react, AI, dll).`;
    }
    
    // 5. Respons berdasarkan versi dengan gaya unik
    const gaya = {
      "K1.5": "📢 [K1.5 Ringan] ",
      "K2": "📘 [K2 Standar] ",
      "K2.5": "🧠 [K2.5 Advanced] ",
      "K3": "🏆 [K3 Pro] "
    };
    const prefix = gaya[version] || "";
    if (version === "K2.5" && /(bisnis|startup|ide|strategi)/i.test(lower)) {
      return prefix + "🚀 Untuk ide bisnis: validasi pasar, buat MVP, lalu ekspansi. Butuh template PRD?";
    }
    if (version === "K3" && /(coding|program|bug|error)/i.test(lower)) {
      return prefix + "🐞 Debug expert: cek null pointers, async/await, gunakan try-catch. Ingin kode contoh?";
    }
    if (version === "K1.5") {
      return prefix + `Jawaban sederhana untuk: "${userMsg.substring(0,60)}". Coba versi K2/K3 untuk analisis lebih dalam.`;
    }
    
    return prefix + `Terima kasih atas pertanyaannya. Saya VIO ${version} siap membantu lebih spesifik jika Anda memberikan detail.`;
  }
  
  // Simulasi delay natural + memory (opsional)
  async function getAIResponse(message, version) {
    return new Promise((resolve) => {
      setTimeout(() => {
        const answer = getBotResponse(message, version);
        resolve(answer);
      }, 500 + Math.random() * 400);
    });
  }
  
  // ==================== UI RENDER ====================
  const chatContainer = document.getElementById('chatContainer');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  let loading = false;
  
  function addMessage(role, text, version = null) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    
    if (role === 'bot') {
      const avatarSpan = document.createElement('span');
      avatarSpan.className = 'avatar';
      avatarSpan.innerText = 'V';
      const wrapper = document.createElement('div');
      wrapper.style.display = 'flex';
      wrapper.style.alignItems = 'center';
      wrapper.appendChild(avatarSpan);
      wrapper.appendChild(bubble);
      messageDiv.appendChild(wrapper);
    } else {
      messageDiv.appendChild(bubble);
    }
    bubble.innerText = text;
    chatContainer.appendChild(messageDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }
  
  let typingIndicator = null;
  function showTyping() {
    if (typingIndicator) typingIndicator.remove();
    typingIndicator = document.createElement('div');
    typingIndicator.className = 'message bot';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    const avatarSpan = document.createElement('span');
    avatarSpan.className = 'avatar';
    avatarSpan.innerText = 'V';
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.alignItems = 'center';
    wrapper.appendChild(avatarSpan);
    wrapper.appendChild(bubble);
    typingIndicator.appendChild(wrapper);
    chatContainer.appendChild(typingIndicator);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }
  function hideTyping() {
    if (typingIndicator) typingIndicator.remove();
    typingIndicator = null;
  }
  
  async function sendUserMessage() {
    const msg = userInput.value.trim();
    if (!msg || loading) return;
    addMessage('user', msg);
    userInput.value = '';
    loading = true;
    showTyping();
    const reply = await getAIResponse(msg, currentVersion);
    hideTyping();
    addMessage('bot', reply, currentVersion);
    loading = false;
  }
  
  // Event listeners
  sendBtn.addEventListener('click', sendUserMessage);
  userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendUserMessage();
  });
  
  // Pilih versi
  const versionBtns = document.querySelectorAll('.ver-btn');
  versionBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      versionBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentVersion = btn.getAttribute('data-ver');
      addMessage('bot', `✅ Versi diubah ke ${currentVersion}. Gaya respons akan menyesuaikan.`, currentVersion);
    });
  });
  
  // Set default versi K2 aktif
  document.querySelector('.ver-btn[data-ver="K2"]').classList.add('active');
  currentVersion = "K2";
  // sambutan
  setTimeout(() => {
    addMessage('bot', `Halo! Saya VIO ${currentVersion}. Pilih versi di atas, tanyakan apa saja — coding, hitung, ide bisnis, atau sains.`, currentVersion);
  }, 200);
</script>
</body>
</html>
